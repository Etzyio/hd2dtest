name: Build and Release

on:
  push:
    branches: [ main, test_ci ]
    tags: [ 'v*.*.*' ]

env:
  GODOT_VERSION: 4.5.1
  EXPORT_NAME: hd2dtest
  PROJECT_PATH: hd2dtest

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: ghcr.io/etzyio/godot-ci:4.5.1-mono
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
      
      - name: Generate Version Info
        run: |
          mkdir -v -p build/windows
          echo "Generating version information..."
          sh build_version.sh
          echo "Version file content:"
          cat version.json
          mv version.json build/windows

      - name: Windows Build
        run: |
          dotnet build
          godot --headless --verbose --export-release "Windows Desktop"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows

  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: ghcr.io/etzyio/godot-ci:4.5.1-mono
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
      - name: Generate Version Info
        run: |
          mkdir -v -p build/linux
          echo "Generating version information..."
          sh build_version.sh
          echo "Version file content:"
          cat version.json
          mv version.json build/linux

      - name: Linux Build
        run: |
          dotnet build
          godot --headless --verbose --export-release "Linux"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux

  export-mac:
    name: Mac Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: barichello/godot-ci:mono-4.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono

      - name: Generate Version Info
        run: |
          mkdir -v -p build/mac
          echo "Generating version information..."
          sh build_version.sh
          echo "Version file content:"
          cat version.json
          mv version.json build/mac

      - name: Mac Build
        run: |
          dotnet build
          godot --headless --verbose --export-release "macOS"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: build/mac